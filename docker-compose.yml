version: "3.9"

# =============================================================
#  MediDispense — Full Stack System
#  Services: Frontend · Backend API · PostgreSQL · Redis
#             MQTT Broker · LoRa Bridge · Notification Worker
# =============================================================

networks:
  medidispense_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mqtt_data:
  mqtt_logs:
  lora_logs:
  uploads:

services:

  # -----------------------------------------------------------
  # 1. FRONTEND  (React + Vite, Nginx)
  # -----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medidispense_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:4000/api/v1
      - VITE_MQTT_WS_URL=ws://localhost:9001
      - VITE_APP_NAME=MediDispense
      - VITE_APP_VERSION=1.0.0
    depends_on:
      - backend
    networks:
      - medidispense_net
    labels:
      - "service=frontend"
      - "description=React dashboard for caregivers"

  # -----------------------------------------------------------
  # 2. BACKEND API  (Node.js + Express)
  # -----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medidispense_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000

      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: medidispense
      DB_USER: mediadmin
      DB_PASSWORD: Str0ngPass!2025

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: RedisPass!2025

      # MQTT
      MQTT_HOST: mqtt_broker
      MQTT_PORT: 1883
      MQTT_USERNAME: backend_service
      MQTT_PASSWORD: MqttBack!2025

      # Auth
      JWT_SECRET: superSecretJWT_MediDispense_2025!
      JWT_EXPIRES_IN: 7d
      REFRESH_TOKEN_SECRET: refreshSecret_2025!
      REFRESH_TOKEN_EXPIRES_IN: 30d

      # Biometric fingerprint verification API
      BIOMETRIC_VERIFY_ENDPOINT: http://localhost:5500/verify

      # Notifications
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: notifications@medidispense.co.ke
      SMTP_PASS: your_smtp_password
      SMS_API_KEY: your_africas_talking_api_key
      SMS_SENDER_ID: MediDisp
      AFRICASTALKING_USERNAME: medidispense

      # File uploads
      UPLOAD_PATH: /app/uploads
      MAX_FILE_SIZE_MB: 5

      # Logging
      LOG_LEVEL: info
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt_broker:
        condition: service_started
    networks:
      - medidispense_net
    labels:
      - "service=backend"
      - "description=REST API + MQTT consumer + WebSocket emitter"

  # -----------------------------------------------------------
  # 3. POSTGRESQL  (Primary database)
  # -----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: medidispense_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: medidispense
      POSTGRES_USER: mediadmin
      POSTGRES_PASSWORD: Str0ngPass!2025
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - ./database/functions.sql:/docker-entrypoint-initdb.d/03_functions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediadmin -d medidispense"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medidispense_net
    labels:
      - "service=database"

  # -----------------------------------------------------------
  # 4. REDIS  (Sessions, caching, pub/sub)
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: medidispense_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass RedisPass!2025
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel notice
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "RedisPass!2025", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medidispense_net
    labels:
      - "service=cache"

  # -----------------------------------------------------------
  # 5. MOSQUITTO MQTT BROKER  (ESP32 ↔ backend messaging)
  # -----------------------------------------------------------
  mqtt_broker:
    image: eclipse-mosquitto:2.0
    container_name: medidispense_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"    # MQTT TCP
      - "9001:9001"    # MQTT over WebSocket (dashboard live feed)
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mqtt/passwd:/mosquitto/config/passwd:ro
      - mqtt_data:/mosquitto/data
      - mqtt_logs:/mosquitto/log
    networks:
      - medidispense_net
    labels:
      - "service=mqtt"
      - "description=Message broker for ESP32 device telemetry"

  # -----------------------------------------------------------
  # 6. LORA BRIDGE  (Python — receives LoRa serial → MQTT)
  # -----------------------------------------------------------
  lora_bridge:
    build:
      context: ./lora_bridge
      dockerfile: Dockerfile
    container_name: medidispense_lora_bridge
    restart: unless-stopped
    privileged: true           # needed for USB/serial port access
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0   # LoRa USB receiver dongle
    environment:
      SERIAL_PORT: /dev/ttyUSB0
      BAUD_RATE: 115200
      MQTT_HOST: mqtt_broker
      MQTT_PORT: 1883
      MQTT_USERNAME: lora_bridge
      MQTT_PASSWORD: LoraPass!2025
      MQTT_TOPIC_PREFIX: devices
      LOG_LEVEL: INFO
    volumes:
      - lora_logs:/app/logs
    depends_on:
      - mqtt_broker
    networks:
      - medidispense_net
    labels:
      - "service=lora_bridge"
      - "description=Reads LoRa serial data and publishes to MQTT"

  # -----------------------------------------------------------
  # 7. NOTIFICATION WORKER  (Background job processor)
  # -----------------------------------------------------------
  notification_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: medidispense_notif_worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: RedisPass!2025
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: medidispense
      DB_USER: mediadmin
      DB_PASSWORD: Str0ngPass!2025
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: notifications@medidispense.co.ke
      SMTP_PASS: your_smtp_password
      SMS_API_KEY: your_africas_talking_api_key
      SMS_SENDER_ID: MediDisp
      AFRICASTALKING_USERNAME: medidispense
    depends_on:
      - redis
      - postgres
    networks:
      - medidispense_net
    labels:
      - "service=worker"
      - "description=Sends SMS/email alerts for missed doses"

  # -----------------------------------------------------------
  # 8. PGADMIN  (Database GUI — dev/staging only)
  # -----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: medidispense_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@medidispense.co.ke
      PGADMIN_DEFAULT_PASSWORD: PgAdmin!2025
    depends_on:
      - postgres
    networks:
      - medidispense_net
    profiles:
      - dev                     # only starts with: docker-compose --profile dev up
    labels:
      - "service=pgadmin"
