# =============================================================
#  Mosquitto MQTT Broker — MediDispense
# =============================================================

# TCP listener — ESP32 + backend
listener 1883
protocol mqtt

# WebSocket listener — browser dashboard
listener 9001
protocol websockets

# Auth — no anonymous access
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# Connection limits
max_connections 100
max_keepalive 300
